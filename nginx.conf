server {
  listen 80;
  # listen 443 ssl;
  # ssl_certificate 
  # ssl_certificate_key 
  # ssl_protocols TLSv1.3 TLSv1.2;
  # ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256";
  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html =404;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer";
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' $backend_api_url; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' https://upload.wikimedia.org; base-uri 'self'; frame-src 'self'; frame-ancestors 'self'; form-action 'self'" always;
    add_header Allow "GET, HEAD, POST" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    proxy_set_header X-Original-URL "";
    proxy_set_header X-Rewrite-URL "";
    proxy_set_header X-Forwarded-Server "";
    proxy_set_header X-Forwarded-Host "";
    proxy_set_header X-Host "";
  }
}
